# Ship on tag: push v0.2.0 → one platform-specific .vsix per OS/arch, a GitHub
# Release carrying them all, and a Marketplace publish when VSCE_PAT is set.
#
# Platform-specific because the extension externalizes NATIVE tree-sitter
# grammars: the vsix ships production node_modules with NAPI prebuilds, so
# each package must be built on its own platform (vsce --target).

name: release

on:
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
          # darwin-x64 has no free GitHub runner anymore (macos-13 retired;
          # Intel images are paid "-large" only) — a job naming it queues
          # forever and wedges the release. Intel-Mac users wait for a paid
          # runner or a self-hosted build.
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Tag matches package.json version
        shell: bash
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG" != "$TAG" ]; then
            echo "tag $TAG does not match package.json $PKG" >&2
            exit 1
          fi

      # npm ci compiles the native grammars for THIS platform — that is the
      # point of the matrix.
      - run: npm ci

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Package
        shell: bash
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: vsix
          merge-multiple: true

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vsix/*.vsix
          body: "See CHANGELOG.md for this release's changes."

      # Marketplace publish is opt-in: add a VSCE_PAT repo secret (a Personal
      # Access Token for the 'utilitydelta' publisher) and this step publishes
      # every platform package; without it the step skips and the GitHub
      # Release is the ship.
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set — skipping Marketplace publish (GitHub Release only)"
            exit 0
          fi
          # Each platform publishes on its own so a stuck upload never strands the
          # rest, and a re-run skips what already shipped. The gallery times out
          # under load (it stranded win32-x64 on the 0.4.0 run) — a transient
          # failure, so retry with backoff. A duplicate version is what a re-run
          # of a partial failure sees: treat it as done, not an error. Any
          # platform still unpublished after retries fails the step, so a real
          # problem stays loud.
          fail=0
          for f in vsix/*.vsix; do
            published=0
            for attempt in 1 2 3; do
              if out=$(npx @vscode/vsce publish --packagePath "$f" -p "$VSCE_PAT" 2>&1); then
                echo "$out"; published=1; break
              fi
              echo "$out"
              if echo "$out" | grep -qiE "already exists|already published|409"; then
                echo "$f: this version is already on the Marketplace — skipping"
                published=1; break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "$f: publish attempt $attempt failed — retrying in $((attempt * 30))s"
                sleep $((attempt * 30))
              fi
            done
            if [ "$published" -ne 1 ]; then
              echo "$f: publish failed after 3 attempts"
              fail=1
            fi
          done
          exit $fail
